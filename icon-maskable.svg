  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <g fill="#ffe8a3" opacity="0.85">
    <circle cx="150" cy="170" r="3"/>
    <circle cx="380" cy="150" r="3"/>
    <circle cx="140" cy="360" r="3"/>
    <circle cx="380" cy="360" r="3"/>
  </g>
  <!-- crescent centered, smaller for safe zone -->
