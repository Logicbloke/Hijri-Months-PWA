      <stop offset="0%" stop-color="#3b2a7e"/>
      <stop offset="60%" stop-color="#1d1054"/>
      <stop offset="100%" stop-color="#0c0633"/>
    </radialGradient>
    <linearGradient id="moon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff5d4"/>
      <stop offset="100%" stop-color="#f4c542"/>
